# --- Public connector (what Railway's edge proxy talks to) ---
# Railway terminates public TLS and forwards PLAIN HTTP to this port.
server.port=${PORT:8080}

# --- Self-signed keystore used by the internal HTTPS connector + pinning demo ---
# Loaded from the classpath so it works regardless of the working directory.
demo.ssl.key-store=classpath:certs/server.p12
demo.ssl.key-store-type=PKCS12
demo.ssl.key-store-password=changeit
demo.ssl.key-alias=ssl-pinning-demo

# Internal HTTPS port that serves the self-signed cert for the pinning demo.
demo.https.port=8443
demo.secure-url=https://localhost:${demo.https.port}/api/secure/ping

spring.application.name=ssl-pinning-service

